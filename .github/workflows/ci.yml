name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore SignalForge.sln
      - run: dotnet build SignalForge.sln --configuration Release --no-restore
      - run: dotnet test SignalForge.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory TestResults
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: TestResults

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/SignalForge.Web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: src/SignalForge.Web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  container:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: signalforge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
