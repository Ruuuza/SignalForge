services:
  signalforge:
    build:
      context: .
    image: signalforge:local
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SignalForge: Data Source=/app/data/signalforge.db
    volumes:
      - signalforge-data:/app/data
    restart: unless-stopped

volumes:
  signalforge-data:
