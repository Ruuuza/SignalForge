services:
  ruzo-solutions:
    build:
      context: .
    image: ruzo-solutions:local
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__RuzoSolutions: Data Source=/app/data/ruzo-solutions.db
    volumes:
      - ruzo-solutions-data:/app/data
    restart: unless-stopped

volumes:
  ruzo-solutions-data:
